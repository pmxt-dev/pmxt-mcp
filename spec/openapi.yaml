                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Get Execution Price Detailed response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExecutionPriceResult'
