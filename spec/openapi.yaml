openapi: 3.0.0
info:
  title: PMXT Sidecar API
  description: >-
    A unified local sidecar API for prediction markets (Polymarket, Kalshi, Limitless). This API acts as a
    JSON-RPC-style gateway. Each endpoint corresponds to a specific method on the generic exchange implementation.
  version: 0.4.4
servers:
  - url: 'http://localhost:3847'
    description: Local development server
paths:
  /health:
    get:
      summary: Server Health Check
      operationId: healthCheck
      responses:
        '200':
          description: Server is consistent and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: integer
                    format: int64
  '/api/{exchange}/loadMarkets':
    post:
      summary: Load Markets
      operationId: loadMarkets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: LoadMarketsRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    type: boolean
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
      responses:
        '200':
          description: Load Markets response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Load and cache all markets from the exchange into `this.markets` and `this.marketsBySlug`. Subsequent calls
        return the cached result without hitting the API again. This is the correct way to paginate or iterate over
        markets without drift. Because `fetchMarkets()` always hits the API, repeated calls with different `offset`
        values may return inconsistent results if the exchange reorders or adds markets between requests. Use
        `loadMarkets()` once to get a stable snapshot, then paginate over `Object.values(exchange.markets)` locally.
  '/api/{exchange}/fetchMarkets':
    get:
      summary: Fetch Markets
      operationId: fetchMarkets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: offset
          required: false
          schema:
            type: number
          description: Pagination offset — number of results to skip
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
          description: Sort order for results
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by market status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
          description: 'Where to search (default: ''title'')'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: For slug/ticker lookup
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: Direct lookup by market ID
        - in: query
          name: outcomeId
          required: false
          schema:
            type: string
          description: Reverse lookup -- find market containing this outcome
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Find markets belonging to an event
        - in: query
          name: page
          required: false
          schema:
            type: number
          description: For pagination (used by Limitless)
        - in: query
          name: similarityThreshold
          required: false
          schema:
            type: number
          description: For semantic search (used by Limitless)
      responses:
        '200':
          description: Fetch Markets response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Fetch individual tradeable contracts (markets). A market is a specific question like "Will Kamala Harris win the
        2028 presidential election?" — for general discovery or search, prefer fetchEvents instead, which returns the
        higher-level topic (e.g., "Who will win the 2028 presidential election?") with all its markets grouped together.
        When users say "search for a market" they almost always mean an event. Use fetchMarkets when you need a specific
        contract by ID/slug, or when you already have an eventId and want its child markets. Always hits the exchange
        API — results reflect the live state at the time of the call.
  '/api/{exchange}/fetchMarketsPaginated':
    get:
      summary: Fetch Markets Paginated
      operationId: fetchMarketsPaginated
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Markets Paginated response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedMarketsResult'
      description: >-
        Fetch markets with cursor-based pagination backed by a stable in-memory snapshot. On the first call (or when no
        cursor is supplied), fetches all markets once and caches them. Subsequent calls with a cursor returned from a
        previous call slice directly from the cached snapshot — no additional API calls are made. The snapshot is
        invalidated after `snapshotTTL` ms (configured via `ExchangeOptions` in the constructor). A request using a
        cursor from an expired snapshot throws `'Cursor has expired'`.
  '/api/{exchange}/fetchEvents':
    get:
      summary: Fetch Events
      operationId: fetchEvents
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: offset
          required: false
          schema:
            type: number
          description: Pagination offset — number of results to skip
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
          description: Sort order for results
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by event status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
          description: 'Where to search (default: ''title'')'
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Direct lookup by event ID
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: Lookup by event slug
      responses:
        '200':
          description: Fetch Events response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedEvent'
      description: >-
        Start here for discovery and search. Events are the top-level grouping in the data model: Event -> Market ->
        Outcome. An event is a broad topic (e.g., "Who will win the 2028 presidential election?"), a market is a
        specific tradeable question within that event (e.g., "Will Kamala Harris win the 2028 presidential election?"),
        and an outcome is the side you buy (e.g., "Yes" or "No"). When a user asks to "find", "search for", or "look
        up" a market, use this tool — they almost always mean the event-level topic. Each returned event includes its
        child markets. Supports optional keyword search, filtering, and pagination.
  '/api/{exchange}/fetchMarket':
    get:
      summary: Fetch Market
      operationId: fetchMarket
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: offset
          required: false
          schema:
            type: number
          description: Pagination offset — number of results to skip
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
          description: Sort order for results
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by market status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
          description: 'Where to search (default: ''title'')'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: For slug/ticker lookup
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: Direct lookup by market ID
        - in: query
          name: outcomeId
          required: false
          schema:
            type: string
          description: Reverse lookup -- find market containing this outcome
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Find markets belonging to an event
        - in: query
          name: page
          required: false
          schema:
            type: number
          description: For pagination (used by Limitless)
        - in: query
          name: similarityThreshold
          required: false
          schema:
            type: number
          description: For semantic search (used by Limitless)
      responses:
        '200':
          description: Fetch Market response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Fetch a single market by lookup parameters. Convenience wrapper around fetchMarkets() that returns a single
        result or throws MarketNotFound.
  '/api/{exchange}/fetchEvent':
    get:
      summary: Fetch Event
      operationId: fetchEvent
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: offset
          required: false
          schema:
            type: number
          description: Pagination offset — number of results to skip
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
          description: Sort order for results
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by event status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
          description: 'Where to search (default: ''title'')'
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Direct lookup by event ID
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: Lookup by event slug
      responses:
        '200':
          description: Fetch Event response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UnifiedEvent'
      description: >-
        Fetch a single event by lookup parameters. Convenience wrapper around fetchEvents() that returns a single result
        or throws EventNotFound.
  '/api/{exchange}/fetchOHLCV':
    get:
      summary: Fetch O H L C V
      operationId: fetchOHLCV
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: resolution
          required: false
          schema:
            type: string
            enum:
              - 1m
              - 5m
              - 15m
              - 1h
              - 6h
              - 1d
          description: Required for candle aggregation
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
          description: Start of the time range
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date-time
          description: End of the time range
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
      responses:
        '200':
          description: Fetch O H L C V response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PriceCandle'
      description: Fetch historical OHLCV (candlestick) price data for a specific market outcome.
  '/api/{exchange}/fetchOrderBook':
    get:
      summary: Fetch Order Book
      operationId: fetchOrderBook
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fetch Order Book response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderBook'
      description: >-
        Fetch the current order book (bids/asks) for a specific outcome. Essential for calculating spread, depth, and
        execution prices.
  '/api/{exchange}/fetchTrades':
    get:
      summary: Fetch Trades
      operationId: fetchTrades
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
          description: Start of the time range
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date-time
          description: End of the time range
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
      responses:
        '200':
          description: Fetch Trades response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Trade'
      description: Fetch raw trade history for a specific outcome.
  '/api/{exchange}/createOrder':
    post:
      summary: Create Order
      operationId: createOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: CreateOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    $ref: '#/components/schemas/CreateOrderParams'
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Create Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Place a new order on the exchange.
  '/api/{exchange}/buildOrder':
    post:
      summary: Build Order
      operationId: buildOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: BuildOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    $ref: '#/components/schemas/CreateOrderParams'
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Build Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BuiltOrder'
      description: >-
        Build an order payload without submitting it to the exchange. Returns the exchange-native signed order or
        request body for inspection, forwarding through a middleware layer, or deferred submission via submitOrder().
  '/api/{exchange}/submitOrder':
    post:
      summary: Submit Order
      operationId: submitOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: SubmitOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    $ref: '#/components/schemas/BuiltOrder'
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Submit Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Submit a pre-built order returned by buildOrder().
  '/api/{exchange}/cancelOrder':
    post:
      summary: Cancel Order
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: CancelOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    type: string
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Cancel Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Cancel an existing open order.
  '/api/{exchange}/fetchOrder':
    get:
      summary: Fetch Order
      operationId: fetchOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fetch Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Fetch a specific order by ID.
  '/api/{exchange}/fetchOpenOrders':
    get:
      summary: Fetch Open Orders
      operationId: fetchOpenOrders
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: marketId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Open Orders response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
      description: 'Fetch all open orders, optionally filtered by market.'
  '/api/{exchange}/fetchMyTrades':
    get:
      summary: Fetch My Trades
      operationId: fetchMyTrades
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: outcomeId
          required: false
          schema:
            type: string
          description: filter to specific outcome/ticker
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: filter to specific market
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
          description: Only return records after this date
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
          description: Only return records before this date
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: for Kalshi cursor pagination
      responses:
        '200':
          description: Fetch My Trades response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserTrade'
  '/api/{exchange}/fetchClosedOrders':
    get:
      summary: Fetch Closed Orders
      operationId: fetchClosedOrders
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: required for Limitless (slug)
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
          description: Only return records after this date
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
          description: Only return records before this date
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from a previous response
      responses:
        '200':
          description: Fetch Closed Orders response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
  '/api/{exchange}/fetchAllOrders':
    get:
      summary: Fetch All Orders
      operationId: fetchAllOrders
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: required for Limitless (slug)
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
          description: Only return records after this date
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
          description: Only return records before this date
        - in: query
          name: limit
          required: false
          schema:
            type: number
          description: Maximum number of results to return
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from a previous response
      responses:
        '200':
          description: Fetch All Orders response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
  '/api/{exchange}/fetchPositions':
    get:
      summary: Fetch Positions
      operationId: fetchPositions
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: address
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Positions response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Position'
      description: Fetch current user positions across all markets.
  '/api/{exchange}/fetchBalance':
    get:
      summary: Fetch Balance
      operationId: fetchBalance
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: address
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Balance response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Balance'
      description: Fetch account balances.
  '/api/{exchange}/getExecutionPrice':
    post:
      summary: Get Execution Price
      operationId: getExecutionPrice
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: GetExecutionPriceRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/OrderBook'
                      - type: string
                        enum:
                          - buy
                          - sell
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Get Execution Price response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: number
      description: >-
        Calculate the volume-weighted average execution price for a given order size. Returns 0 if the order cannot be
        fully filled.
  '/api/{exchange}/getExecutionPriceDetailed':
    post:
      summary: Get Execution Price Detailed
      operationId: getExecutionPriceDetailed
