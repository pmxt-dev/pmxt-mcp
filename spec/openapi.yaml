  '/api/{exchange}/filterMarkets':
    post:
      summary: Filter Markets
      operationId: filterMarkets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: FilterMarketsRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    oneOf:
                      - type: array
                        items:
                          $ref: '#/components/schemas/UnifiedMarket'
                      - type: string
                      - type: object
                        properties:
                          text:
                            type: string
                          searchIn:
                            type: array
                            items:
                              type: string
                              enum:
                                - title
                                - description
                                - category
                                - tags
                                - outcomes
                          volume24h:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          volume:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          liquidity:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          openInterest:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          resolutionDate:
                            type: object
                            properties:
                              before:
                                type: string
                                format: date-time
                              after:
                                type: string
                                format: date-time
                          category:
                            type: string
                          tags:
                            type: array
                            items:
                              type: string
                          price:
                            type: object
                            properties:
                              outcome:
                                type: string
                                enum:
                                  - 'yes'
                                  - 'no'
                                  - up
                                  - down
                              min:
                                type: number
                              max:
                                type: number
                            required:
                              - outcome
                          priceChange24h:
                            type: object
                            properties:
                              outcome:
                                type: string
                                enum:
                                  - 'yes'
                                  - 'no'
                                  - up
                                  - down
                              min:
                                type: number
                              max:
                                type: number
                            required:
                              - outcome
                      - type: object
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Filter Markets response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Filter a list of markets by criteria. Can filter by string query, structured criteria object, or custom filter
        function.
  '/api/{exchange}/filterEvents':
    post:
      summary: Filter Events
      operationId: filterEvents
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: FilterEventsRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    oneOf:
                      - type: array
                        items:
                          $ref: '#/components/schemas/UnifiedEvent'
                      - type: string
                      - type: object
                        properties:
                          text:
                            type: string
                          searchIn:
                            type: array
                            items:
                              type: string
                              enum:
                                - title
                                - description
                                - category
                                - tags
                          category:
                            type: string
                          tags:
                            type: array
                            items:
                              type: string
                          marketCount:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          totalVolume:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                      - type: object
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Filter Events response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedEvent'
      description: >-
        Filter a list of events by criteria. Can filter by string query, structured criteria object, or custom filter
        function.
  '/api/{exchange}/watchOrderBook':
    post:
      summary: Watch Order Book
      operationId: watchOrderBook
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: WatchOrderBookRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 1
                  maxItems: 2
                  items:
                    oneOf:
                      - type: string
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Watch Order Book response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderBook'
      description: >-
        Watch order book updates in real-time via WebSocket. Returns a promise that resolves with the next order book
        update. Call repeatedly in a loop to stream updates (CCXT Pro pattern).
  '/api/{exchange}/watchTrades':
    post:
      summary: Watch Trades
      operationId: watchTrades
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: WatchTradesRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 1
                  maxItems: 4
                  items:
                    oneOf:
                      - type: string
                      - type: string
                      - type: number
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Watch Trades response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Trade'
      description: >-
        Watch trade executions in real-time via WebSocket. Returns a promise that resolves with the next trade(s). Call
        repeatedly in a loop to stream updates (CCXT Pro pattern).
  '/api/{exchange}/watchAddress':
    post:
      summary: Watch Address
      operationId: watchAddress
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: WatchAddressRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 1
                  maxItems: 2
                  items:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: object
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Watch Address response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
      description: >-
        Stream activity for a public wallet address Returns a promise that resolves with the next activity snapshot
        whenever a change is detected. Call repeatedly in a loop to stream updates (CCXT Pro pattern).
  '/api/{exchange}/unwatchAddress':
    post:
      summary: Unwatch Address
      operationId: unwatchAddress
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: UnwatchAddressRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    type: string
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Unwatch Address response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      description: Stop watching a previously registered wallet address and release its resource updates.
  '/api/{exchange}/close':
    post:
      summary: Close
      operationId: close
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: CloseRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 0
                  items: {}
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
      responses:
        '200':
          description: Close response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      description: >-
        Close all WebSocket connections and clean up resources. Call this when you're done streaming to properly release
        connections.
components:
  parameters:
    ExchangeParam:
      in: path
      name: exchange
      schema:
        type: string
        enum:
          - polymarket
          - kalshi
          - kalshi-demo
          - limitless
          - probable
          - baozi
          - myriad
          - opinion
          - metaculus
          - smarkets
          - polymarket_us
      required: true
      description: The prediction market exchange to target.
  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      properties:
        message:
          type: string
    BaseRequest:
      type: object
      description: Base request structure with optional credentials
      properties:
        credentials:
          $ref: '#/components/schemas/ExchangeCredentials'
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
    UnifiedMarket:
      type: object
      properties:
        marketId:
          type: string
          description: The unique identifier for this market
        eventId:
          type: string
          description: Link to parent event
        title:
          type: string
          description: 'The market title (e.g., "Will BTC close above $100k on Dec 31?").'
        description:
          type: string
          description: Long-form market description or resolution criteria.
        slug:
          type: string
          description: URL-friendly slug for the market.
        outcomes:
          type: array
          items:
            $ref: '#/components/schemas/MarketOutcome'
          description: The possible outcomes for this market.
        resolutionDate:
          type: string
          format: date-time
          description: When the market is scheduled to resolve.
        volume24h:
          type: number
          description: Trading volume over the past 24 hours (USD).
        volume:
          type: number
          description: Total / Lifetime volume
        liquidity:
          type: number
          description: Current market liquidity (USD).
        openInterest:
          type: number
          description: Total value of outstanding contracts (USD).
        url:
          type: string
          description: Canonical URL to view the market on the venue.
        image:
          type: string
          description: Optional image URL for the market.
        category:
          type: string
          description: 'Optional category label (e.g., "Politics", "Crypto").'
        tags:
          type: array
          items:
            type: string
          description: Optional list of tags associated with the market.
        tickSize:
          type: number
          description: 'Minimum price increment (e.g., 0.01, 0.001)'
        status:
          type: string
          description: 'Venue-native lifecycle status (e.g. ''active'', ''closed'', ''archived'').'
        contractAddress:
          type: string
          description: 'On-chain contract / condition identifier where applicable (Polymarket conditionId, etc.).'
        'yes':
          allOf:
            - $ref: '#/components/schemas/MarketOutcome'
          description: Convenience accessor for the YES outcome on a binary market.
        'no':
          allOf:
            - $ref: '#/components/schemas/MarketOutcome'
          description: Convenience accessor for the NO outcome on a binary market.
        up:
          allOf:
            - $ref: '#/components/schemas/MarketOutcome'
          description: Convenience accessor for the UP outcome on a binary market.
        down:
          allOf:
            - $ref: '#/components/schemas/MarketOutcome'
          description: Convenience accessor for the DOWN outcome on a binary market.
      required:
        - marketId
        - title
        - description
        - outcomes
        - resolutionDate
        - volume24h
        - liquidity
        - url
    MarketOutcome:
      type: object
      properties:
        outcomeId:
          type: string
          description: 'Outcome ID for trading operations (CLOB Token ID for Polymarket, Market Ticker for Kalshi)'
        marketId:
          type: string
          description: The market this outcome belongs to (set automatically when outcomes are built)
        label:
          type: string
          description: 'Human-readable outcome label (e.g., "Yes", "No", candidate name).'
        price:
          type: number
          description: Probability between 0.0 and 1.0.
        priceChange24h:
          type: number
          description: 'Change in price over the past 24 hours, as an absolute probability delta.'
        metadata:
          type: object
          additionalProperties: {}
          description: 'Exchange-specific metadata (e.g., clobTokenId for Polymarket)'
      required:
        - outcomeId
        - label
        - price
    UnifiedEvent:
      type: object
      description: >-
        The top-level grouping in the data model (Event -> Market -> Outcome). An event is a broad topic like "Who will
        win the 2028 presidential election?" and contains one or more child markets, each representing a specific
        tradeable question (e.g., "Will Kamala Harris win?"). This is the primary object returned by fetchEvents and is
        almost always what users mean when they say "market".
      properties:
        id:
          type: string
          description: The unique identifier for this event.
        title:
          type: string
          description: 'The event title (e.g., "Who will be Fed Chair?").'
        description:
          type: string
          description: Long-form event description.
        slug:
          type: string
          description: URL-friendly slug for the event.
        markets:
          type: array
          items:
            $ref: '#/components/schemas/UnifiedMarket'
          description: Markets grouped under this event.
        volume24h:
          type: number
          description: Trading volume over the past 24 hours (USD).
        volume:
          type: number
          description: Total / Lifetime volume (sum across markets; undefined if no market provides it)
        url:
          type: string
          description: Canonical URL to view the event on the venue.
        image:
          type: string
          description: Optional image URL for the event.
        category:
          type: string
          description: 'Optional category label (e.g., "Politics", "Sports").'
        tags:
          type: array
          items:
            type: string
          description: Optional list of tags associated with the event.
      required:
        - id
        - title
        - description
        - slug
        - markets
        - volume24h
        - url
    PriceCandle:
      type: object
      properties:
        timestamp:
          type: number
          description: Unix timestamp in milliseconds marking the start of the candle.
        open:
          type: number
          description: Opening price for the interval (probability between 0.0 and 1.0).
        high:
          type: number
          description: Highest price during the interval (probability between 0.0 and 1.0).
        low:
          type: number
          description: Lowest price during the interval (probability between 0.0 and 1.0).
        close:
          type: number
          description: Closing price for the interval (probability between 0.0 and 1.0).
        volume:
          type: number
          description: Trading volume during the interval.
      required:
        - timestamp
        - open
        - high
        - low
        - close
    OrderBook:
      type: object
      properties:
        bids:
          type: array
          items:
            $ref: '#/components/schemas/OrderLevel'
          description: 'Order book bid levels, sorted by price descending.'
        asks:
          type: array
          items:
            $ref: '#/components/schemas/OrderLevel'
          description: 'Order book ask levels, sorted by price ascending.'
        timestamp:
          type: number
          description: Unix timestamp in milliseconds when the snapshot was taken.
      required:
        - bids
        - asks
    OrderLevel:
      type: object
      properties:
        price:
          type: number
          description: 0.0 to 1.0 (probability)
        size:
          type: number
          description: contracts/shares
      required:
        - price
        - size
    Trade:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this trade.
        timestamp:
          type: number
          description: Unix timestamp in milliseconds when the trade executed.
        price:
          type: number
          description: Probability between 0.0 and 1.0.
        amount:
          type: number
          description: Size of the trade in contracts/shares.
        side:
          type: string
          enum:
            - buy
            - sell
            - unknown
          description: Trade side from the taker's perspective.
        outcomeId:
          type: string
          description: The outcome this trade is for (if known).
      required:
        - id
        - timestamp
        - price
        - amount
        - side
    UserTrade:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this trade.
        timestamp:
          type: number
          description: Unix timestamp in milliseconds when the trade executed.
        price:
          type: number
          description: Probability between 0.0 and 1.0.
        amount:
          type: number
          description: Size of the trade in contracts/shares.
        side:
          type: string
          enum:
            - buy
            - sell
            - unknown
          description: Trade side from the taker's perspective.
        outcomeId:
          type: string
          description: The outcome this trade is for (if known).
        orderId:
          type: string
          description: 'The order that produced this trade, if known.'
      required:
        - id
        - timestamp
        - price
        - amount
        - side
    Order:
      type: object
      properties:
        id:
          type: string
          description: The exchange-assigned order identifier.
        marketId:
          type: string
          description: The market this order was placed on.
        outcomeId:
          type: string
          description: The outcome this order was placed on.
        side:
          type: string
          enum:
            - buy
            - sell
          description: 'Order side: buy or sell.'
        type:
          type: string
          enum:
            - market
            - limit
          description: 'Order type: market (execute immediately) or limit (resting at a price).'
        price:
          type: number
          description: For limit orders
        amount:
          type: number
          description: Size in contracts/shares
        status:
          type: string
          enum:
            - pending
            - open
            - filled
            - cancelled
            - rejected
          description: Lifecycle status of the order.
        filled:
          type: number
          description: Amount filled
        remaining:
          type: number
          description: Amount remaining
        timestamp:
          type: number
          description: Unix timestamp in milliseconds when the order was created.
        fee:
          type: number
          description: 'Fee paid for this order, if known.'
      required:
        - id
        - marketId
        - outcomeId
        - side
        - type
        - amount
        - status
        - filled
        - remaining
        - timestamp
    Position:
      type: object
      properties:
        marketId:
          type: string
          description: The market this position is held in.
        outcomeId:
          type: string
          description: The outcome this position is held in.
        outcomeLabel:
          type: string
          description: Human-readable label for the outcome held.
        size:
          type: number
          description: 'Positive for long, negative for short'
        entryPrice:
          type: number
          description: Average entry price for the position (probability between 0.0 and 1.0).
        currentPrice:
          type: number
          description: Current mark price for the position (probability between 0.0 and 1.0).
        unrealizedPnL:
          type: number
          description: Unrealized profit or loss at the current price (USD).
        realizedPnL:
          type: number
          description: Realized profit or loss booked so far (USD).
      required:
        - marketId
        - outcomeId
        - outcomeLabel
        - size
        - entryPrice
        - currentPrice
        - unrealizedPnL
    Balance:
      type: object
      properties:
        currency:
          type: string
          description: 'e.g., ''USDC'''
        total:
          type: number
          description: Total balance including funds locked in open orders.
        available:
          type: number
          description: Balance available to trade (excludes locked funds).
        locked:
          type: number
          description: In open orders
      required:
        - currency
        - total
        - available
        - locked
    ExecutionPriceResult:
      type: object
      properties:
        price:
          type: number
        filledAmount:
          type: number
        fullyFilled:
          type: boolean
      required:
        - price
        - filledAmount
        - fullyFilled
    PaginatedMarketsResult:
      type: object
      description: Shape returned by fetchMarketsPaginated
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UnifiedMarket'
          description: The page of unified markets
        total:
          type: number
          description: Total number of markets in the snapshot
        nextCursor:
          type: string
          description: 'Cursor to pass to the next call, or undefined if this is the last page'
      required:
        - data
        - total
    MarketFilterParams:
      type: object
      properties:
        limit:
          type: number
          description: Maximum number of results to return
        offset:
          type: number
          description: Pagination offset — number of results to skip
        sort:
          type: string
          enum:
            - volume
            - liquidity
            - newest
          description: Sort order for results
        status:
          type: string
          enum:
            - active
            - inactive
            - closed
            - all
          description: 'Filter by market status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        searchIn:
          type: string
          enum:
            - title
            - description
            - both
          description: 'Where to search (default: ''title'')'
        query:
          type: string
          description: For keyword search
        slug:
          type: string
          description: For slug/ticker lookup
        marketId:
          type: string
          description: Direct lookup by market ID
        outcomeId:
          type: string
          description: Reverse lookup -- find market containing this outcome
        eventId:
          type: string
          description: Find markets belonging to an event
        page:
          type: number
          description: For pagination (used by Limitless)
        similarityThreshold:
          type: number
          description: For semantic search (used by Limitless)
    EventFetchParams:
      type: object
      properties:
        query:
          type: string
          description: For keyword search
        limit:
          type: number
          description: Maximum number of results to return
        offset:
          type: number
          description: Pagination offset — number of results to skip
        sort:
          type: string
          enum:
            - volume
            - liquidity
            - newest
          description: Sort order for results
        status:
          type: string
          enum:
            - active
            - inactive
            - closed
            - all
          description: 'Filter by event status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        searchIn:
          type: string
          enum:
            - title
            - description
            - both
          description: 'Where to search (default: ''title'')'
        eventId:
          type: string
          description: Direct lookup by event ID
        slug:
          type: string
          description: Lookup by event slug
    HistoryFilterParams:
      type: object
      description: Deprecated - use OHLCVParams or TradesParams instead. Resolution is optional for backward compatibility.
      properties:
        resolution:
          type: string
          enum:
            - 1m
            - 5m
            - 15m
            - 1h
            - 6h
            - 1d
          description: Optional for backward compatibility
        start:
          type: string
          format: date-time
          description: Start of the time range
        end:
          type: string
          format: date-time
          description: End of the time range
        limit:
          type: number
          description: Maximum number of results to return
    OHLCVParams:
      type: object
      properties:
        resolution:
          type: string
          enum:
            - 1m
            - 5m
            - 15m
            - 1h
            - 6h
            - 1d
          description: Required for candle aggregation
        start:
          type: string
          format: date-time
          description: Start of the time range
        end:
          type: string
          format: date-time
          description: End of the time range
        limit:
          type: number
          description: Maximum number of results to return
      required:
        - resolution
    TradesParams:
      type: object
      description: Parameters for fetching trade history. No resolution parameter - trades are discrete events.
      properties:
        start:
          type: string
          format: date-time
          description: Start of the time range
        end:
          type: string
          format: date-time
          description: End of the time range
        limit:
          type: number
          description: Maximum number of results to return
    CreateOrderParams:
      type: object
      properties:
        marketId:
          type: string
          description: The market to trade on.
        outcomeId:
          type: string
          description: The outcome to trade.
        side:
          type: string
          enum:
            - buy
            - sell
          description: 'Order side: buy or sell.'
        type:
          type: string
          enum:
            - market
            - limit
          description: 'Order type: market (execute immediately) or limit (resting at a price).'
        amount:
          type: number
          description: Size of the order in contracts/shares.
        price:
          type: number
          description: Required for limit orders
        fee:
          type: number
          description: 'Optional fee rate (e.g., 1000 for 0.1%)'
        tickSize:
          type: number
          description: Optional override for Limitless/Polymarket
        negRisk:
          type: boolean
          description: Optional override to skip neg-risk lookup (Polymarket)
      required:
        - marketId
        - outcomeId
        - side
        - type
        - amount
    BuiltOrder:
      type: object
      properties:
        exchange:
          type: string
          description: The exchange name this order was built for.
        params:
          allOf:
            - $ref: '#/components/schemas/CreateOrderParams'
          description: The original params used to build this order.
        signedOrder:
          type: object
          additionalProperties: {}
          description: 'For CLOB exchanges (Polymarket): the EIP-712 signed order ready to POST to the exchange''s order endpoint.'
        tx:
          type: object
          properties:
            to:
              type: string
            data:
              type: string
            value:
              type: string
            chainId:
              type: number
          required:
            - to
            - data
            - value
            - chainId
          description: >-
            For on-chain AMM exchanges: the EVM transaction payload. Reserved for future exchanges; no current exchange
            populates this.
        raw:
          description: 'The raw, exchange-native payload. Always present.'
      required:
        - exchange
        - params
        - raw
    MyTradesParams:
      type: object
      properties:
        outcomeId:
          type: string
          description: filter to specific outcome/ticker
        marketId:
          type: string
          description: filter to specific market
        since:
          type: string
          format: date-time
          description: Only return records after this date
        until:
          type: string
          format: date-time
          description: Only return records before this date
        limit:
          type: number
          description: Maximum number of results to return
        cursor:
          type: string
          description: for Kalshi cursor pagination
    OrderHistoryParams:
      type: object
      properties:
        marketId:
          type: string
          description: required for Limitless (slug)
        since:
          type: string
          format: date-time
          description: Only return records after this date
        until:
          type: string
          format: date-time
          description: Only return records before this date
        limit:
          type: number
          description: Maximum number of results to return
        cursor:
          type: string
          description: Opaque pagination cursor from a previous response
    ExchangeCredentials:
      type: object
      description: Optional authentication credentials for exchange operations.
      properties:
        apiKey:
          type: string
        apiSecret:
          type: string
          description: Standard API secret for HMAC-authenticated exchanges
        passphrase:
          type: string
          description: Standard API passphrase for HMAC-authenticated exchanges
        apiToken:
          type: string
          description: 'Metaculus: `Authorization: Token <apiToken>` for higher rate limits'
        privateKey:
          type: string
          description: Required for Polymarket L1 auth
        signatureType:
          oneOf:
            - type: number
            - type: string
          description: '0 = EOA, 1 = Poly Proxy, 2 = Gnosis Safe (Can also use ''eoa'', ''polyproxy'', ''gnosis_safe'')'
        funderAddress:
          type: string
          description: The address funding the trades (defaults to signer address)
